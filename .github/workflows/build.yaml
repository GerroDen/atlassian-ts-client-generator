name: Build
on:
  push:
    branches: ["main"]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - run: yarn install --immutable
      - run: yarn lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - run: yarn install --immutable
      - run: yarn test
  gen:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api:
          - bamboo-api
          - bitbucket-api
          - confluence-cloud-api-v1
          - confluence-cloud-api-v2
          - jira-cloud-api
          - jira-cloud-service-management-api
          - jira-software-cloud-api
          - migration-api
          - teams-cloud-api
          - user-management-cloud-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - run: yarn install --immutable
      - run: yarn gen:${{ matrix.api }}
